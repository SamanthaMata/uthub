        {id:607,nombre:"Tiramisú",precio:60,desc:"Capas de bizcocho en café, mascarpone y cacao. El clásico.",img:"https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?w=400&h=300&fit=crop",badge:"Especial"},
        {id:608,nombre:"Panna Cotta",precio:50,desc:"Crema italiana con coulis de frutos rojos y menta.",img:"https://images.unsplash.com/photo-1488477181946-6428a0291777?w=400&h=300&fit=crop"}
      ]}
    ]
  }
};

function renderProducto(p, tiendaNombre) {
  const badge = p.badge ? `<div class="producto-badge">${p.badge}</div>` : '';
  const nombre = p.nombre.replace(/'/g,"\\'");
  const tienda = tiendaNombre.replace(/'/g,"\\'");
  return `
    <div class="producto-card">
      <div class="producto-image">
        <img src="${p.img}" alt="${p.nombre}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=400&h=300&fit=crop'">
        ${badge}
      </div>
      <div class="producto-content">
        <h3 class="producto-name">${p.nombre}</h3>
        <p class="producto-description">${p.desc}</p>
        <div class="producto-footer">
          <div class="producto-price">$${p.precio}</div>
          <button class="btn-add-cart" id="btn-${p.id}"
            onclick="handleAddToCart('${nombre}',${p.precio},${p.id},'${tienda}',this)">
            <span class="add-text">Agregar</span>
            <span class="check-icon">✓ Listo</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </div>
      </div>
    </div>`;
}

function renderMenu(tienda) {
  const cats = tienda.categorias.map((c,i) =>
    `<a href="#${c.id}" class="category-link ${i===0?'active':''}">${c.titulo}</a>`
  ).join('');
  const sections = tienda.categorias.map(c => `
    <div class="menu-category" id="${c.id}">
      <h2 class="category-title">${c.titulo}</h2>
      <div class="productos-grid">${c.productos.map(p => renderProducto(p, tienda.nombreCorto)).join('')}</div>
    </div>`).join('');
  const stars = '★'.repeat(Math.floor(tienda.calificacion));
  const closedBanner = !tienda.abierto ? `
    <div class="tienda-closed-banner">
      🔴 <strong>Tienda cerrada</strong> — Puedes ver el menú pero no se aceptan pedidos ahora.
    </div>` : '';
  return `
    <div class="tienda-detail-header">
      <div class="tienda-detail-banner">
        <img src="${tienda.banner}" alt="${tienda.nombreCorto}" loading="lazy">
      </div>
      <div class="tienda-detail-info">
        <div class="tienda-detail-left">
          <div class="tienda-logo">${tienda.emoji}</div>
          <div>
            <h1 class="tienda-detail-name">${tienda.nombreCorto}</h1>
            <div class="tienda-detail-meta">
              <div class="rating-large">
                <span class="stars">${stars}</span>
                <span class="rating-value">${tienda.calificacion}</span>
                <span class="rating-count">(${tienda.resenas} reseñas)</span>
              </div>
              <span class="meta-divider">•</span>
              <span class="meta-text">${tienda.tipo}</span>
              <span class="meta-divider">•</span>
              <span class="meta-text">${tienda.edificio}</span>
            </div>
            <p class="tienda-detail-description">${tienda.descripcion}</p>
          </div>
        </div>
        <div class="tienda-detail-status">
          <div class="status-badge ${tienda.abierto?'status-open':'status-closed'}">
            <span class="status-dot"></span>
            ${tienda.abierto?'Abierto ahora':'Cerrado'}
          </div>
          <div class="status-hours">${tienda.horario}</div>
        </div>
      </div>
    </div>
    ${closedBanner}
    <div class="menu-container">
      <div class="menu-sidebar">
        <div class="menu-categories sticky">
          <h3 class="sidebar-title">Categorías</h3>
          <nav class="categories-nav">${cats}</nav>
        </div>
      </div>
      <div class="menu-content">${sections}</div>
    </div>`;
}

function handleAddToCart(nombre, precio, id, tiendaNombre, btn) {
  window._currentTiendaNombre = tiendaNombre;
  addToCart(nombre, precio, id, btn);
}

document.addEventListener('DOMContentLoaded', () => {
  const tiendaId = parseInt(new URLSearchParams(window.location.search).get('tienda'));
  const tienda = TIENDAS[tiendaId];
  const root = document.getElementById('menu-root');
  if (!tienda) {
    root.innerHTML = `<div style="text-align:center;padding:80px 40px;">
      <div style="font-size:64px">🍽️</div>
      <h2 style="font-family:Syne,sans-serif;font-size:22px;font-weight:800;margin:16px 0 8px;">Tienda no encontrada</h2>
      <a href="tiendas.html" style="display:inline-block;padding:12px 28px;background:#F5841F;color:white;border-radius:12px;text-decoration:none;font-family:Syne,sans-serif;font-weight:700;">Ver Tiendas</a>
    </div>`;
    return;
  }
  document.title = 'Menú - ' + tienda.nombreCorto + ' - UThub';
  document.getElementById('breadcrumb-tienda').textContent = tienda.nombreCorto;
  root.innerHTML = renderMenu(tienda);
  initMenuPage();
  updateCartDisplay();
});

  </script>
</body>
</html>
